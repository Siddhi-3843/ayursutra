{% extends "base.html" %}
{% block title %}Schedule Therapy{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-green-800">
            Schedule Therapy Session 📅
        </h1>
        <p class="text-gray-500 mt-1">Book a new therapy session for a patient</p>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" action="/therapy/add">

            <!-- Patient Selection -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Select Patient <span class="text-red-500">*</span>
                </label>
                <select name="patient_id" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Choose a patient...</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}">
                        #{{ patient.id }} — {{ patient.name }}
                        {% if patient.dosha_type %}({{ patient.dosha_type }}){% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Therapy Name -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Therapy Name <span class="text-red-500">*</span>
                </label>
                <select name="therapy_name" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Select therapy...</option>
                    <option value="Abhyanga">Abhyanga (Oil Massage)</option>
                    <option value="Shirodhara">Shirodhara</option>
                    <option value="Vamana">Vamana</option>
                    <option value="Virechana">Virechana</option>
                    <option value="Basti">Basti</option>
                    <option value="Nasya">Nasya</option>
                    <option value="Raktamokshana">Raktamokshana</option>
                    <option value="Swedana">Swedana</option>
                    <option value="Pinda Sweda">Pinda Sweda</option>
                    <option value="Shiro Abhyanga">Shiro Abhyanga</option>
                </select>
            </div>

            <!-- Therapist Name -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Therapist Name
                </label>
                <input type="text" name="therapist_name"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="e.g. Dr. Priya Sharma">
            </div>

            <!-- Date and Time -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Date <span class="text-red-500">*</span>
                    </label>
                    <input type="date" name="session_date" required
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Time <span class="text-red-500">*</span>
                    </label>
                    <input type="time" name="session_time" required
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>

            <!-- Duration -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Duration (minutes)
                </label>
                <select name="duration_minutes"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="30">30 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="60" selected>60 minutes</option>
                    <option value="90">90 minutes</option>
                    <option value="120">120 minutes</option>
                </select>
            </div>

            <!-- Notes -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Notes / Instructions
                </label>
                <textarea name="notes" rows="3"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="Any special instructions for this session..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4">
                <button type="submit"
                    class="bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 font-medium">
                    Schedule Session 📅
                </button>
                <a href="/therapy"
                    class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-medium">
                    Cancel
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
