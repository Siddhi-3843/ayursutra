{% extends "base.html" %}
{% block title %}Edit Session{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-green-800">
                Edit Session ✏️
            </h1>
            <p class="text-gray-500 mt-1">
                Updating therapy session details
            </p>
        </div>
        <a href="/therapy"
           class="text-gray-500 hover:underline">
            ← Cancel
        </a>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" action="/therapy/edit/{{ session.id }}">

            <!-- Patient -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Patient <span class="text-red-500">*</span>
                </label>
                <select name="patient_id" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    {% for patient in patients %}
                    <option value="{{ patient.id }}"
                        {% if patient.id == session.patient_id %}selected{% endif %}>
                        #{{ patient.id }} — {{ patient.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Therapy Name -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Therapy Name <span class="text-red-500">*</span>
                </label>
                <select name="therapy_name" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="Abhyanga" {% if session.therapy_name == 'Abhyanga' %}selected{% endif %}>Abhyanga</option>
                    <option value="Shirodhara" {% if session.therapy_name == 'Shirodhara' %}selected{% endif %}>Shirodhara</option>
                    <option value="Vamana" {% if session.therapy_name == 'Vamana' %}selected{% endif %}>Vamana</option>
                    <option value="Virechana" {% if session.therapy_name == 'Virechana' %}selected{% endif %}>Virechana</option>
                    <option value="Basti" {% if session.therapy_name == 'Basti' %}selected{% endif %}>Basti</option>
                    <option value="Nasya" {% if session.therapy_name == 'Nasya' %}selected{% endif %}>Nasya</option>
                    <option value="Raktamokshana" {% if session.therapy_name == 'Raktamokshana' %}selected{% endif %}>Raktamokshana</option>
                    <option value="Swedana" {% if session.therapy_name == 'Swedana' %}selected{% endif %}>Swedana</option>
                    <option value="Pinda Sweda" {% if session.therapy_name == 'Pinda Sweda' %}selected{% endif %}>Pinda Sweda</option>
                    <option value="Shiro Abhyanga" {% if session.therapy_name == 'Shiro Abhyanga' %}selected{% endif %}>Shiro Abhyanga</option>
                </select>
            </div>

            <!-- Therapist -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Therapist Name
                </label>
                <input type="text" name="therapist_name"
                    value="{{ session.therapist_name or '' }}"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- Date and Time -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Date <span class="text-red-500">*</span>
                    </label>
                    <input type="date" name="session_date" required
                        value="{{ session.session_date }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Time <span class="text-red-500">*</span>
                    </label>
                    <input type="time" name="session_time" required
                        value="{{ session.session_time }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>

            <!-- Duration -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Duration (minutes)
                </label>
                <select name="duration_minutes"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="30" {% if session.duration_minutes == 30 %}selected{% endif %}>30 minutes</option>
                    <option value="45" {% if session.duration_minutes == 45 %}selected{% endif %}>45 minutes</option>
                    <option value="60" {% if session.duration_minutes == 60 %}selected{% endif %}>60 minutes</option>
                    <option value="90" {% if session.duration_minutes == 90 %}selected{% endif %}>90 minutes</option>
                    <option value="120" {% if session.duration_minutes == 120 %}selected{% endif %}>120 minutes</option>
                </select>
            </div>

            <!-- Status -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Status
                </label>
                <select name="status"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="Scheduled" {% if session.status == 'Scheduled' %}selected{% endif %}>📅 Scheduled</option>
                    <option value="In Progress" {% if session.status == 'In Progress' %}selected{% endif %}>⏳ In Progress</option>
                    <option value="Completed" {% if session.status == 'Completed' %}selected{% endif %}>✅ Completed</option>
                    <option value="Cancelled" {% if session.status == 'Cancelled' %}selected{% endif %}>❌ Cancelled</option>
                </select>
            </div>

            <!-- Notes -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Notes
                </label>
                <textarea name="notes" rows="3"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">{{ session.notes or '' }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="flex gap-4">
                <button type="submit"
                    class="bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 font-medium">
                    Save Changes ✅
                </button>
                <a href="/therapy"
                    class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-medium">
                    Cancel
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
