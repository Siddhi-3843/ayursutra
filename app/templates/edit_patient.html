{% extends "base.html" %}
{% block title %}Edit Patient{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-green-800">
                Edit Patient ✏️
            </h1>
            <p class="text-gray-500 mt-1">
                Updating details for {{ patient.name }}
            </p>
        </div>
        <a href="/patients/{{ patient.id }}"
           class="text-gray-500 hover:underline">
            ← Cancel
        </a>
    </div>

    <!-- Form -->
    <form method="POST" action="/patients/edit/{{ patient.id }}">

        <!-- SECTION 1: Basic Information -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold text-green-700 mb-4 border-b pb-2">
                1. Basic Information
            </h2>
            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Full Name <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="name" required
                        value="{{ patient.name }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                    <input type="number" name="age"
                        value="{{ patient.age or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Date of Birth
                    </label>
                    <input type="date" name="date_of_birth"
                        value="{{ patient.date_of_birth or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Gender <span class="text-red-500">*</span>
                    </label>
                    <select name="gender" required
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Phone <span class="text-red-500">*</span>
                    </label>
                    <input type="tel" name="phone" required
                        value="{{ patient.phone }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email"
                        value="{{ patient.email or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <input type="text" name="address"
                        value="{{ patient.address or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Emergency Contact Name
                    </label>
                    <input type="text" name="emergency_contact_name"
                        value="{{ patient.emergency_contact_name or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Emergency Contact Number
                    </label>
                    <input type="tel" name="emergency_contact_number"
                        value="{{ patient.emergency_contact_number or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

            </div>
        </div>

        <!-- SECTION 2: Visit Details -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold text-green-700 mb-4 border-b pb-2">
                2. Visit Details
            </h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Reason for Visit
                    </label>
                    <textarea name="reason_for_visit" rows="3"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">{{ patient.reason_for_visit or '' }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Department
                    </label>
                    <select name="department"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">Select...</option>
                        <option value="Panchakarma" {% if patient.department == 'Panchakarma' %}selected{% endif %}>Panchakarma</option>
                        <option value="Kayachikitsa" {% if patient.department == 'Kayachikitsa' %}selected{% endif %}>Kayachikitsa</option>
                        <option value="Shalakya" {% if patient.department == 'Shalakya' %}selected{% endif %}>Shalakya</option>
                        <option value="Prasuti" {% if patient.department == 'Prasuti' %}selected{% endif %}>Prasuti Tantra</option>
                        <option value="Balroga" {% if patient.department == 'Balroga' %}selected{% endif %}>Kaumarabhritya</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Dosha Type
                    </label>
                    <select name="dosha_type"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">Unknown</option>
                        <option value="Vata" {% if patient.dosha_type == 'Vata' %}selected{% endif %}>Vata</option>
                        <option value="Pitta" {% if patient.dosha_type == 'Pitta' %}selected{% endif %}>Pitta</option>
                        <option value="Kapha" {% if patient.dosha_type == 'Kapha' %}selected{% endif %}>Kapha</option>
                        <option value="Vata-Pitta" {% if patient.dosha_type == 'Vata-Pitta' %}selected{% endif %}>Vata-Pitta</option>
                        <option value="Pitta-Kapha" {% if patient.dosha_type == 'Pitta-Kapha' %}selected{% endif %}>Pitta-Kapha</option>
                        <option value="Vata-Kapha" {% if patient.dosha_type == 'Vata-Kapha' %}selected{% endif %}>Vata-Kapha</option>
                        <option value="Tridosha" {% if patient.dosha_type == 'Tridosha' %}selected{% endif %}>Tridosha</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- SECTION 3: Physical Details -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold text-green-700 mb-4 border-b pb-2">
                3. Physical Details
            </h2>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Height (cm)
                    </label>
                    <input type="number" name="height" id="height"
                        value="{{ patient.height or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                        oninput="calculateBMI()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Weight (kg)
                    </label>
                    <input type="number" name="weight" id="weight"
                        value="{{ patient.weight or '' }}"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                        oninput="calculateBMI()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        BMI (auto)
                    </label>
                    <input type="text" name="bmi" id="bmi" readonly
                        value="{{ patient.bmi or '' }}"
                        class="w-full border rounded-lg px-3 py-2 bg-gray-50 text-green-700 font-bold">
                </div>
            </div>
        </div>

        <!-- SECTION 4: Additional Notes -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h2 class="text-xl font-semibold text-green-700 mb-4 border-b pb-2">
                4. Additional Notes
            </h2>
            <textarea name="additional_notes" rows="4"
                class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">{{ patient.additional_notes or '' }}</textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 mb-8">
            <button type="submit"
                class="bg-green-700 text-white px-8 py-3 rounded-lg hover:bg-green-800 font-medium text-lg">
                Save Changes ✅
            </button>
            <a href="/patients/{{ patient.id }}"
                class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-medium text-lg">
                Cancel
            </a>
        </div>

    </form>
</div>

{% block scripts %}
<script>
function calculateBMI() {
    const height = document.getElementById('height').value;
    const weight = document.getElementById('weight').value;
    if (height && weight) {
        const h = height / 100;
        const bmi = (weight / (h * h)).toFixed(2);
        document.getElementById('bmi').value = bmi;
    }
}
</script>
{% endblock %}
{% endblock %}
